      <line x1="190" y1="50"  x2="288" y2="50"/>
      <line x1="190" y1="80"  x2="288" y2="80"/>
      <line x1="190" y1="110" x2="268" y2="110"/>
      <line x1="190" y1="150" x2="288" y2="150"/>
